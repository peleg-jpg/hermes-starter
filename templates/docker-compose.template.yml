# Isolated Hermes brain "__NAME__" — reuses the hermes-wa:local image,
# own state volume, own container, own .env, own resource budget.
# Rendered by lib/new-brain.sh. Edit mem_limit / cpus to resize.
#
# HARD RULE: never point two containers at the same ./data folder.
# Concurrent SQLite/session writes corrupt state.db and the memory store.

services:
  __NAME__:
    image: hermes-wa:local
    container_name: __NAME__
    restart: unless-stopped
    networks:
      - default
    volumes:
      - ./data:/opt/data
    environment:
      - HERMES_UID=1001
      - HERMES_GID=1001
    env_file:
      - .env
    mem_limit: __MEM__
    cpus: __CPUS__
    command: ["sleep", "infinity"]
